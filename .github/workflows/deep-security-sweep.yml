name: Deep Security Sweep

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  deep-scan:
    runs-on: ${{ fromJSON(vars.SSH_HUNT_RUNNER_LABELS != '' && vars.SSH_HUNT_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install security tooling
        run: |
          cargo install cargo-audit@0.21.0 --locked
          cargo install cargo-deny --locked
          if ! command -v osv-scanner >/dev/null 2>&1; then
            version="2.3.3"
            arch="$(uname -m)"
            case "${arch}" in
              x86_64)
                asset="osv-scanner_linux_amd64"
                ;;
              aarch64|arm64)
                asset="osv-scanner_linux_arm64"
                ;;
              *)
                echo "Unsupported architecture for osv-scanner: ${arch}"
                exit 1
                ;;
            esac
            url="https://github.com/google/osv-scanner/releases/download/v${version}/${asset}"
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL "${url}" -o /tmp/osv-scanner
            elif command -v wget >/dev/null 2>&1; then
              wget -q "${url}" -O /tmp/osv-scanner
            else
              echo "Neither curl nor wget is available for downloading osv-scanner."
              exit 1
            fi
            chmod +x /tmp/osv-scanner
            if command -v sudo >/dev/null 2>&1; then
              sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
            elif install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner 2>/dev/null; then
              true
            else
              mkdir -p "${HOME}/.local/bin"
              install -m 0755 /tmp/osv-scanner "${HOME}/.local/bin/osv-scanner"
              echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
            fi
          fi

      - name: Dependency advisories
        run: cargo audit --ignore RUSTSEC-2023-0071
        working-directory: ssh-hunt

      - name: Policy checks
        run: cargo deny check --config deny.toml --hide-inclusion-graph bans licenses sources
        working-directory: ssh-hunt

      - name: Trivy full repo scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          version: v0.69.3
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: table

      - name: OSV recursive scan
        run: osv-scanner scan source --config=ssh-hunt/osv-scanner.toml -r .

  dependency-update-pr:
    runs-on: ${{ fromJSON(vars.SSH_HUNT_RUNNER_LABELS != '' && vars.SSH_HUNT_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust dependencies
        working-directory: ssh-hunt
        run: |
          cargo update -w

      - name: Create dependency update PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(deps): weekly dependency refresh"
          branch: "automation/weekly-dependency-refresh"
          delete-branch: true
          title: "chore(deps): weekly dependency refresh"
          body: |
            Automated weekly dependency refresh.
            - Triggered by deep security sweep workflow.
            - Run CI + security pipelines before merge.
          labels: |
            dependencies
            security
