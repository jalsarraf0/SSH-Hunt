name: SSH-Hunt CI
on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
      - v*
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write
concurrency:
  group: SSH-Hunt-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTUP_HOME: /home/runner/.rustup
  CARGO_HOME: /home/runner/.cargo

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, unified-all]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache ~/.cargo/registry
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-registry-lint-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/registry
          restore-keys: ${{ runner.os }}-cargo-registry-lint-
      - name: Cache target (lint)
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-target-lint-${{ hashFiles('**/Cargo.lock') }}
          path: ssh-hunt/target
          restore-keys: ${{ runner.os }}-cargo-target-lint-
      - name: Check formatting
        shell: bash
        timeout-minutes: 5
        working-directory: ssh-hunt
        run: cargo fmt --all --check
      - name: Clippy lints
        shell: bash
        timeout-minutes: 20
        working-directory: ssh-hunt
        run: cargo clippy --workspace --all-targets -- -D warnings
  test:
    name: Test
    runs-on: [self-hosted, unified-all]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache ~/.cargo/registry
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/registry
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache ~/.cargo/git
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          path: ~/.cargo/git
          restore-keys: ${{ runner.os }}-cargo-git-

      - name: Cache target
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          path: target
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Cargo test
        shell: bash
        timeout-minutes: 25
        working-directory: ssh-hunt
        run: cargo test --workspace
  security:
    name: Security
    runs-on: [self-hosted, unified-all]
    needs: lint
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install security tools
        shell: bash
        timeout-minutes: 10
        run: |
          command -v gitleaks >/dev/null || echo "gitleaks not found — skipping install"
          command -v cargo-audit >/dev/null || cargo install cargo-audit --locked 2>/dev/null || true
          command -v cargo-deny >/dev/null || cargo install cargo-deny --locked 2>/dev/null || true
      - name: Secrets scan (gitleaks)
        shell: bash
        timeout-minutes: 10
        run: command -v gitleaks >/dev/null && gitleaks detect --source=. --no-banner --exit-code=1 || echo "gitleaks not available — skipping"
      - name: Cargo audit
        shell: bash
        timeout-minutes: 10
        working-directory: ssh-hunt
        run: cargo audit
      - name: Cargo deny
        shell: bash
        timeout-minutes: 10
        working-directory: ssh-hunt
        run: command -v cargo-deny >/dev/null && cargo deny check bans licenses sources || echo "cargo-deny not available — skipping"
      - name: Trivy filesystem scan
        shell: bash
        timeout-minutes: 15
        working-directory: ssh-hunt
        run: command -v trivy >/dev/null && trivy fs --severity HIGH,CRITICAL --exit-code 1 . || echo "trivy not available — skipping"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
      - name: OSV Scanner
        shell: bash
        continue-on-error: true
        timeout-minutes: 10
        working-directory: ssh-hunt
        run: command -v osv-scanner >/dev/null && osv-scanner -r . || echo "osv-scanner not available — skipping"
  sbom:
    name: SBOM
    runs-on: [self-hosted, unified-all]
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate SBOM (syft)
        shell: bash
        timeout-minutes: 10
        working-directory: ssh-hunt
        run: |
          syft dir:. -o spdx-json=sbom-spdx.json -o cyclonedx-json=sbom-cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.json
          retention-days: 90
  docker:
    name: Docker Build
    runs-on: [self-hosted, unified-all]
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker images
        shell: bash
        timeout-minutes: 30
        working-directory: ssh-hunt
        run: command -v docker >/dev/null && docker compose version >/dev/null 2>&1 && docker compose build ssh-hunt || echo 'docker compose not available — skipping build'
  release:
    name: Release
    runs-on: [self-hosted, unified-all]
    needs:
      - test
      - security
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate checksums
        shell: bash
        timeout-minutes: 5
        run: cd release-assets && sha256sum * > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
