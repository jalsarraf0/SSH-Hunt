name: Security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security-checks:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Fail on forbidden process spawning API
        run: |
          if rg -n "std::process::Command|tokio::process::Command" ssh-hunt/crates; then
            echo "Forbidden process-spawning API detected"
            exit 1
          fi

      - name: Ensure host-breakout intrusion guard remains active
        run: |
          rg -n "fn escape_attempt_reason" ssh-hunt/crates/ssh_hunt_server/src/main.rs
          rg -n "ban_forever\\(" ssh-hunt/crates/ssh_hunt_server/src/main.rs
          rg -n "INTRUSION DETECTED" ssh-hunt/crates/ssh_hunt_server/src/main.rs

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071
        working-directory: ssh-hunt

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check --config deny.toml --hide-inclusion-graph bans licenses sources
        working-directory: ssh-hunt

      - name: Server security regression tests
        run: cargo test -p ssh_hunt_server --locked
        working-directory: ssh-hunt

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          version: v0.69.3
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: OSV scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        with:
          scan-args: --config=ssh-hunt/osv-scanner.toml -r .
