name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security-checks:
    runs-on: ${{ fromJSON(vars.SSH_HUNT_RUNNER_LABELS != '' && vars.SSH_HUNT_RUNNER_LABELS || '["ubuntu-latest"]') }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce self-hosted runner directive
        run: ./scripts/verify-self-hosted-runner-directive.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ripgrep
        run: |
          if command -v rg >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y ripgrep
            exit 0
          fi
          echo "ripgrep is required but apt-get is unavailable on this runner."
          exit 1

      - name: Fail on forbidden process spawning API
        run: |
          if rg -n "std::process::Command|tokio::process::Command" ssh-hunt/crates; then
            echo "Forbidden process-spawning API detected"
            exit 1
          fi

      - name: Ensure host-breakout intrusion guard remains active
        run: |
          rg -n "fn escape_attempt_reason" ssh-hunt/crates/ssh_hunt_server/src/main.rs
          rg -n "ban_forever\\(" ssh-hunt/crates/ssh_hunt_server/src/main.rs
          rg -n "INTRUSION DETECTED" ssh-hunt/crates/ssh_hunt_server/src/main.rs

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071
        working-directory: ssh-hunt

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check --config deny.toml --hide-inclusion-graph bans licenses sources
        working-directory: ssh-hunt

      - name: Server security regression tests
        run: cargo test -p ssh_hunt_server --locked
        working-directory: ssh-hunt

      - name: Full integration regression suite
        run: cargo test -p integration_tests --test regression --release --locked
        working-directory: ssh-hunt

      - name: Full workspace test gate
        run: cargo test --workspace --all-features --locked
        working-directory: ssh-hunt

      - name: Install Gitleaks
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks version
            exit 0
          fi
          version="8.24.3"
          arch="$(uname -m)"
          case "${arch}" in
            x86_64)
              archive="gitleaks_${version}_linux_x64.tar.gz"
              ;;
            aarch64|arm64)
              archive="gitleaks_${version}_linux_arm64.tar.gz"
              ;;
            *)
              echo "Unsupported architecture for gitleaks: ${arch}"
              exit 1
              ;;
          esac
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          tmpdir="$(mktemp -d)"
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL "${url}" -o "${tmpdir}/${archive}"
          elif command -v wget >/dev/null 2>&1; then
            wget -q "${url}" -O "${tmpdir}/${archive}"
          else
            echo "Neither curl nor wget is available for downloading gitleaks."
            exit 1
          fi
          tar -xzf "${tmpdir}/${archive}" -C "${tmpdir}"
          if command -v sudo >/dev/null 2>&1; then
            sudo install -m 0755 "${tmpdir}/gitleaks" /usr/local/bin/gitleaks
          elif install -m 0755 "${tmpdir}/gitleaks" /usr/local/bin/gitleaks 2>/dev/null; then
            true
          else
            mkdir -p "${HOME}/.local/bin"
            install -m 0755 "${tmpdir}/gitleaks" "${HOME}/.local/bin/gitleaks"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Install OSV scanner
        run: |
          if command -v osv-scanner >/dev/null 2>&1; then
            osv-scanner --version
            exit 0
          fi
          version="2.3.3"
          arch="$(uname -m)"
          case "${arch}" in
            x86_64)
              asset="osv-scanner_linux_amd64"
              ;;
            aarch64|arm64)
              asset="osv-scanner_linux_arm64"
              ;;
            *)
              echo "Unsupported architecture for osv-scanner: ${arch}"
              exit 1
              ;;
          esac
          url="https://github.com/google/osv-scanner/releases/download/v${version}/${asset}"
          tmpdir="$(mktemp -d)"
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL "${url}" -o "${tmpdir}/osv-scanner"
          elif command -v wget >/dev/null 2>&1; then
            wget -q "${url}" -O "${tmpdir}/osv-scanner"
          else
            echo "Neither curl nor wget is available for downloading osv-scanner."
            exit 1
          fi
          chmod +x "${tmpdir}/osv-scanner"
          if command -v sudo >/dev/null 2>&1; then
            sudo install -m 0755 "${tmpdir}/osv-scanner" /usr/local/bin/osv-scanner
          elif install -m 0755 "${tmpdir}/osv-scanner" /usr/local/bin/osv-scanner 2>/dev/null; then
            true
          else
            mkdir -p "${HOME}/.local/bin"
            install -m 0755 "${tmpdir}/osv-scanner" "${HOME}/.local/bin/osv-scanner"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Gitleaks
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          gitleaks detect --source . --redact --verbose --exit-code 1 --report-format sarif --report-path gitleaks.sarif

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          version: v0.69.3
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: OSV scanner
        run: osv-scanner scan source --config=ssh-hunt/osv-scanner.toml -r .
