name: SBOM — Source Level

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-sbom:
    runs-on: ${{ fromJSON(vars.SSH_HUNT_RUNNER_LABELS != '' && vars.SSH_HUNT_RUNNER_LABELS || '["ubuntu-latest"]') }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-sbom-${{ hashFiles('ssh-hunt/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-sbom-

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        working-directory: ssh-hunt
        run: |
          cargo cyclonedx --format json --spec-version 1.4
          echo "Generated SBOM files:"
          find . -name "*.cdx.json" | sort || true

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Validate no critical advisories against SBOM crates
        working-directory: ssh-hunt
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-sbom-cyclonedx
          path: |
            ssh-hunt/**/*.cdx.json
          retention-days: 90

      - name: Verify SBOM contains workspace crates
        working-directory: ssh-hunt
        run: |
          # cargo-cyclonedx in workspace mode emits one SBOM per crate under each crate dir
          all_sbom="$(find . -name "*.cdx.json" | sort)"
          count="$(echo "$all_sbom" | grep -c '\.cdx\.json' || true)"
          echo "Total SBOM files generated: ${count}"
          echo "$all_sbom"
          # Verify each key workspace crate has its own SBOM file
          for crate in ssh_hunt_server world shell vfs; do
            if echo "$all_sbom" | grep -q "$crate"; then
              echo "  FOUND SBOM: $crate"
            else
              echo "  WARNING: no SBOM found for $crate"
            fi
          done
