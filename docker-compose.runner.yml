services:
  github-runner:
    build:
      context: .
      dockerfile: docker/runner/Dockerfile
    image: ssh-hunt-gh-runner:local
    container_name: ssh-hunt-gh-runner
    restart: unless-stopped
    env_file:
      - .env.runner
    environment:
      RUNNER_SCOPE: repo
      RUNNER_WORKDIR: /tmp/runner/work
      RUNNER_EPHEMERAL: ${RUNNER_EPHEMERAL:-false}
      RUNNER_NAME: ${RUNNER_NAME:-ssh-hunt-runner-01}
    network_mode: host
    cpus: ${RUNNER_CPU_LIMIT_PER_CONTAINER:-0.1500}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/gh-runner:/tmp/runner
    security_opt:
      - no-new-privileges:true

  github-runner-ephemeral-1:
